version: "3.9"

# Required env vars (generated by setup.sh → written to .env):
#   VPS_IP      — public IP of this server
#   TURN_SECRET — random 32-byte hex string

services:

  # ── Coturn TURN relay ────────────────────────────────────────────────────
  # network_mode:host so Coturn can bind UDP/TCP directly on the host NIC.
  # All media travels through this relay; participant IPs are never exposed.
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    command: >
      -n
      --listening-port=3478
      --realm=${VPS_IP}
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --external-ip=${VPS_IP}
      --fingerprint
      --log-file=stdout
      --denied-peer-ip=10.0.0.0/8
      --denied-peer-ip=192.168.0.0/16
      --denied-peer-ip=172.16.0.0/12
      --denied-peer-ip=127.0.0.0/8

  # ── ASP.NET Core signaling backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"   # only reachable via nginx proxy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Turn__Host=${VPS_IP}
      - Turn__Secret=${TURN_SECRET}
      - Turn__TlsPort=5349
      - Turn__UdpPort=3478
      - Cors__AllowedOrigins__0=https://${VPS_IP}

  # ── React frontend served by nginx ──────────────────────────────────────
  # nginx also reverse-proxies /api/ and /hub/ → backend:5000
  # so VITE_SIGNALING_URL is empty (relative URLs).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SIGNALING_URL=
        - VITE_FORCE_RELAY=true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
