# Coturn configuration for Russia-resilient WebRTC
# Deploy on VPS in Turkey (AS/EU) or Kazakhstan - neutral location

# Listening ports
listening-port=3478
tls-listening-port=443
alt-listening-port=3479
alt-tls-listening-port=5349

# Listen on all interfaces
listening-ip=0.0.0.0

# Your server's public IP - REQUIRED
# external-ip=YOUR_PUBLIC_IP

# Realm (domain name)
realm=turn.yourdomain.com

# HMAC-SHA1 time-limited credentials (generated by backend)
use-auth-secret
static-auth-secret=replace_with_strong_random_secret_min_32_chars

# TLS certificates (use Let's Encrypt)
# cert=/etc/ssl/turn.yourdomain.com/fullchain.pem
# pkey=/etc/ssl/turn.yourdomain.com/privkey.pem

# Cipher suites - prefer modern ones that look like standard HTTPS
cipher-list="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384"

# DTLS (UDP-based TLS for TURN over TLS)
no-dtls

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Performance tuning
max-bps=0
total-quota=0
user-quota=0

# Security: prevent relay to localhost and private IPs
no-loopback-peers
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Allow only relay allocation (no STUN for peering, we force relay on client)
# stale-nonce=600

# Fingerprint in TURN messages
fingerprint

# Enable CLI for monitoring
cli-port=5766
cli-password=replace_with_cli_password
