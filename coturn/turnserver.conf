# Coturn configuration for Russia-resilient WebRTC
#
# This file documents the recommended settings. In production, coturn runs
# via docker-compose command-line args (see docker-compose.yml).
#
# The primary TURNS port is 5349. Port 443 is handled via nginx SNI
# multiplexing — when a client connects to turns:turn.domain.com:443,
# nginx reads the TLS SNI and TCP-proxies to coturn on 5349.

# Listening ports
listening-port=3478
tls-listening-port=5349

# Listen on all interfaces
listening-ip=0.0.0.0

# Your server's public IP — REQUIRED (set via --external-ip in docker-compose)
# external-ip=YOUR_PUBLIC_IP

# Realm (domain name)
realm=turn.yourdomain.com

# HMAC-SHA1 time-limited credentials (generated by backend)
use-auth-secret
static-auth-secret=replace_with_strong_random_secret_min_32_chars

# TLS certificates — use Let's Encrypt (setup.sh handles this)
cert=/etc/coturn/certs/cert.pem
pkey=/etc/coturn/certs/key.pem

# Cipher suites — modern ciphers that look like standard HTTPS to DPI
cipher-list="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384"

no-dtls

log-file=stdout
verbose

# Relay port range — make sure firewall allows UDP 49152-65535
min-port=49152
max-port=65535

# Performance
max-bps=0
total-quota=0
user-quota=0

# Security: prevent relay to localhost and private IPs
no-loopback-peers
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

fingerprint
